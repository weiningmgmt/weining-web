<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚凝管理顧問 | WEINING Consulting</title>
    <style>
        :root {
            --bg-black: #1b1a1a;
            --deep-green: #1b3a2d;
            --text-light: #e0e0e0;
            --text-dim: #888; /* 版權與Email文字顏色 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* 導覽列 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(27, 26, 26, 0.98);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }

        nav ul { display: flex; list-style: none; }
        nav ul li { position: relative; margin-left: 2rem; }

        nav a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.95rem;
            transition: 0.3s;
            padding: 10px 0;
            display: block;
        }

        nav a:hover { color: var(--text-light); }

        /* 下拉選單樣式 */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #252424;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1;
            top: 100%;
            left: 0;
        }

        .dropdown-content a {
            padding: 12px 16px;
            border-bottom: 1px solid #333;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* 首頁主視覺 */
        header {
            height: 85vh;
            display: flex;
            justify-content: center;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 4rem; margin-bottom: 0.5rem; letter-spacing: 4px; }
        .subtitle { font-size: 1.5rem; color: var(--text-dim); margin-bottom: 1rem; }
        .slogan { font-size: 1.2rem; color: var(--deep-green); font-style: italic; }

        /* 底部 */
        footer {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-top: 1px solid #333;
        }

        .footer-link {
            color: var(--text-dim);
            text-decoration: none;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: var(--text-light);
            text-decoration: underline;
        }
    </style>
</head>
