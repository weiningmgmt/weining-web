<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚凝管理顧問 | WEINING Consulting</title>
    <style>
        :root {
            --bg-black: #1b1a1a;
            --deep-green: #1b3a2d; /* 妳 Logo 的綠色 */
            --text-light: #e0e0e0;
            --text-dim: #888;
            --form-bg: #252424;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* --- 導覽列：綠色背景 + 白色底線 --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--deep-green);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 100px; /* 增加高度讓 Logo 顯眼 */
            border-bottom: 1.5px solid #ffffff; /* 妳要的白色底線 */
        }

        .logo {
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* --- Logo 放大處理 --- */
        .logo-img {
            height: 85px;
            width: auto;
            display: block;
            object-fit: contain;
            padding: 5px 0;
        }

        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { position: relative; margin-left: 2rem; }

        /* --- 導覽列文字：維持白色 --- */
        nav a {
            text-decoration: none;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s;
            padding: 10px 0;
            display: block;
        }

        nav a:hover { color: rgba(255, 255, 255, 0.7); }

        /* --- 下拉選單 --- */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--form-bg);
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            top: 100%;
            left: 0;
        }

        .dropdown-content a {
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            color: var(--text-light);
        }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- Hero Section --- */
        header {
            height: 75vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 { font-size: 4rem; margin-bottom: 0.5rem; letter-spacing: 4px; }
        .subtitle { font-size: 1.5rem; color: var(--text-dim); margin-bottom: 1rem; }

        /* --- 聯絡區塊 --- */
        .contact-section {
            padding: 80px 10%;
            background-color: #151414;
            text-align: center;
        }

        .contact-section h2 { margin-bottom: 3rem; font-size: 2rem; letter-spacing: 2px; }

        .contact-form {
            max-width: 700px;
            margin: 0 auto;
            text-align: left;
        }

        .form-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group label { margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--form-bg);
            border: 1px solid #333;
            color: var(--text-light);
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus { border-color: var(--deep-green); }

        .submit-btn {
            background: var(--deep-green);
            color: white;
            padding: 15px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            width: 100%;
            margin-top: 1rem;
            letter-spacing: 2px;
        }

        .submit-btn:hover { background: #26523e; }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-top: 1px solid #333;
        }

        .footer-legal-links {
            margin-top: 1.2rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .legal-link, .legal-link:visited, .legal-link:active {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .legal-link:hover { color: var(--text-light); }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; gap: 1.5rem; }
            h1 { font-size: 2.5rem; }
            nav { height: 80px; }
            .logo-img { height: 60px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="index.html">
                <img src="WEINING 網站logo.png" alt="蔚凝管理顧問" class="logo-img">
            </a>
        </div>
        <ul>
            <li><a href="index.html">首頁</a></li>
            <li class="dropdown">
                <a href="#">服務項目 ▾</a>
                <div class="dropdown-content">
                    <a href="operations.html">營運管理</a>
                    <a href="nexus.html">WEINING Nexus</a>
                </div>
            </li>
            <li><a href="cases.html">客戶案例</a></li>
            <li><a href="client.html">客戶專區</a></li>
            <li><a href="about.html">關於蔚凝</a></li>
        </ul>
    </nav>

    <header>
        <div class="hero-content">
            <h1>蔚凝管理顧問</h1>
            <p class="subtitle">數據驅動的餐飲營運解決方案</p>
        </div>
    </header>

   <section class="contact-section">
        <h2>聯絡我們</h2>
        <form id="my-form" class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <label>公司名稱</label>
                    <input type="text" name="公司名稱" placeholder="您的品牌或公司">
                </div>
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" name="姓名" placeholder="您的稱呼" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>電話</label>
                    <input type="tel" name="電話" placeholder="聯絡電話">
                </div>
                <div class="form-group">
                    <label>電子信箱</label>
                    <input type="email" name="email" placeholder="您的 Email" required>
                </div>
            </div>

            <div class="form-group">
                <label>諮詢內容</label>
                <textarea name="諮詢內容" rows="5" placeholder="請描述您的需求或品牌遇到的問題" required></textarea>
            </div>

            <button type="submit" class="submit-btn">送出諮詢表單</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 蔚凝管理顧問有限公司 Weining Management Consulting</p>
        <div class="footer-legal-links">
            <a href="privacy.html" class="legal-link">隱私政策</a>
            <a href="terms.html" class="legal-link">使用條款</a>
        </div>
    </footer>

    <script>
        const form = document.getElementById("my-form");
        async function handleSubmit(event) {
            event.preventDefault();
            const data = new FormData(event.target);
            fetch("https://formspree.io/f/mykbpbpa", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    alert("感謝您的諮詢，我們將儘速與您聯繫！");
                    form.reset();
                } else {
                    alert("抱歉，送出時發生錯誤，請稍後再試。");
                }
            }).catch(error => {
                alert("抱歉，網路連線發生問題。");
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
