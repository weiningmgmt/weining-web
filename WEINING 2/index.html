// ---- Scroll observer ----
function useScrollFade(dep) {
  useEffect(() => {
    const run = () => {
      const els = document.querySelectorAll('.fade-in:not(.visible)');
      const obs = new IntersectionObserver((entries) => {
        entries.forEach((e) => {if (e.isIntersecting) e.target.classList.add('visible');});
      }, { threshold: 0.08, rootMargin: '0px 0px -50px 0px' });
      els.forEach((el) => obs.observe(el));
      return obs;
    };
    const obs = run();
    return () => obs.disconnect();
  }, [dep]);
}

</p>

// ---- CONTACT ----
function ContactPage({ t, accent }) {
  useScrollFade('contact');
  const [submitted, setSubmitted] = useState(false);
  const [fadingOut, setFadingOut] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const formRef = useRef(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (submitting) return;
    setSubmitting(true);
    setError('');
    try {
      const data = new FormData(formRef.current);
      const res = await fetch("https://formspree.io/f/mojrkylk", {
        method: 'POST', body: data, headers: { Accept: 'application/json' }
      });
      if (res.ok) {
        setFadingOut(true);
        setTimeout(() => setSubmitted(true), 550);
      } else {
        setError('傳送失敗，請稍後再試或直接聯繫官方信箱。');
      }
    } catch (_) {
      setError('傳送失敗，請稍後再試或直接聯繫官方信箱。');
    } finally {
      setSubmitting(false);
    }
  };

  const inputStyle = { width: '100%', padding: '14px 16px', background: '#222120', border: `1px solid ${t.borderColor}`, color: t.text, outline: 'none', fontFamily: t.bodyFont, fontSize: '0.9rem', transition: 'border-color 0.22s' };
  const focusIn = (e) => e.target.style.borderColor = '#1b3a2d';
  const focusOut = (e) => e.target.style.borderColor = t.borderColor;

  return (
    <div>
      <section style={{ minHeight: '50vh', display: 'flex', alignItems: 'flex-end', padding: '100px 10% 80px', background: 'rgba(8, 18, 12, 0.97)', position: 'relative', overflow: 'hidden' }}>
        <FloatingDots />
        <div style={{ position: 'relative', zIndex: 1 }}>
          <p style={{ fontFamily: t.bodyFont, fontSize: '0.7rem', letterSpacing: '5px', color: 'rgba(255,255,255,0.45)', marginBottom: '2.5rem', textTransform: 'uppercase' }} className="fade-in">CONTACT US</p>
          <h1 style={{ fontFamily: t.headingFont, fontSize: '2rem', fontWeight: t.headingWeight, color: '#fff', letterSpacing: '6px', marginBottom: '1rem' }} className="fade-in">聯絡我們</h1>
          <p style={{ fontFamily: t.bodyFont, color: 'rgba(255,255,255,0.62)', fontSize: '1rem', maxWidth: '500px', lineHeight: 1.95, fontWeight: 300 }} className="fade-in">有任何問題或合作洽詢，歡迎填寫表單，我們將儘速與您聯繫。</p>
        </div>
      </section>
      <section style={{ padding: '110px 10%', background: t.bg }}>
        {submitted ?
        <div style={{
          textAlign: 'center', padding: '80px 20px', maxWidth: '680px', margin: '0 auto',
          opacity: 0, animation: 'weining-fadein 0.7s ease-out forwards'
        }}>
            <div style={{ width: '56px', height: '1px', background: '#d4af37', margin: '0 auto 2.8rem', opacity: 0.85 }} />
            <p style={{ fontFamily: t.bodyFont, fontSize: '0.7rem', letterSpacing: '5px', color: '#d4af37', marginBottom: '2rem', textTransform: 'uppercase', opacity: 0.85 }}>THANK YOU</p>
            <h2 style={{ fontFamily: t.headingFont, fontSize: '2.2rem', fontWeight: t.headingWeight, color: '#d4af37', letterSpacing: '4px', marginBottom: '2rem', lineHeight: 1.4 }}>
              諮詢訊息已成功送出
            </h2>
            <p style={{ fontFamily: t.bodyFont, fontSize: '1rem', color: 'rgba(232,228,222,0.78)', lineHeight: 2, fontWeight: 300, letterSpacing: '1px', maxWidth: '500px', margin: '0 auto' }}>
              感謝您的信任。<br />蔚凝將於 24 小時內，<br />由專人與您聯繫初步諮詢事宜。
            </p>
          </div> :

        <form ref={formRef} onSubmit={handleSubmit} action="https://formspree.io/f/mojrkylk" method="POST" style={{
          maxWidth: '680px', margin: '0 auto',
          opacity: fadingOut ? 0 : 1,
          transform: fadingOut ? 'translateY(-12px)' : 'translateY(0)',
          transition: 'opacity 0.55s ease-out, transform 0.55s ease-out',
          pointerEvents: fadingOut ? 'none' : 'auto'
        }}>
            {/* Hidden fields */}
            <input type="hidden" name="_subject" value="蔚凝管理顧問 - 新客戶諮詢" />
            <input type="text" name="_gotcha" tabIndex={-1} autoComplete="off" style={{ position: 'absolute', left: '-9999px', width: '1px', height: '1px', opacity: 0 }} aria-hidden="true" />

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem', marginBottom: '1.5rem' }}>
              <div className="fade-in">
                <label style={{ display: 'block', fontFamily: t.bodyFont, fontSize: '0.75rem', color: t.textDim, marginBottom: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase' }}>姓名 *</label>
                <input required name="name" style={inputStyle} placeholder="您的稱呼" onFocus={focusIn} onBlur={focusOut} />
              </div>
              <div className="fade-in">
                <label style={{ display: 'block', fontFamily: t.bodyFont, fontSize: '0.75rem', color: t.textDim, marginBottom: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase' }}>電話 *</label>
                <input required type="tel" name="tel" style={inputStyle} placeholder="聯絡電話" onFocus={focusIn} onBlur={focusOut} />
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem', marginBottom: '1.5rem' }}>
              <div className="fade-in">
                <label style={{ display: 'block', fontFamily: t.bodyFont, fontSize: '0.75rem', color: t.textDim, marginBottom: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase' }}>電子信箱</label>
                <input type="email" name="email" style={inputStyle} placeholder="your@email.com" onFocus={focusIn} onBlur={focusOut} />
              </div>
              <div className="fade-in">
                <label style={{ display: 'block', fontFamily: t.bodyFont, fontSize: '0.75rem', color: t.textDim, marginBottom: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase' }}>店家名稱 / 品牌</label>
                <input name="brand" style={inputStyle} placeholder="您的品牌或店家" onFocus={focusIn} onBlur={focusOut} />
              </div>
            </div>
            <div style={{ marginBottom: '2rem' }} className="fade-in">
              <label style={{ display: 'block', fontFamily: t.bodyFont, fontSize: '0.75rem', color: t.textDim, marginBottom: '0.7rem', letterSpacing: '2px', textTransform: 'uppercase' }}>諮詢需求 *</label>
              <textarea required name="message" rows={6} style={{ ...inputStyle, resize: 'vertical' }} placeholder="請描述您的需求或品牌遇到的問題" onFocus={focusIn} onBlur={focusOut} />
            </div>
            {error &&
            <p style={{ fontFamily: t.bodyFont, fontSize: '0.85rem', color: '#c46b6b', marginBottom: '1.2rem', letterSpacing: '1px' }}>{error}</p>
            }
            <button type="submit" disabled={submitting} className="fade-in" style={{
              width: '100%', padding: '18px',
              background: submitting ? '#3a3a3a' : '#d4af37',
              color: submitting ? 'rgba(255,255,255,0.6)' : '#1b1a1a',
              border: 'none', cursor: submitting ? 'wait' : 'pointer',
              fontFamily: t.bodyFont, fontSize: '0.9rem', letterSpacing: '3px',
              fontWeight: 500, transition: 'all 0.25s',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '12px'
            }}
            onMouseEnter={(e) => { if (!submitting) e.currentTarget.style.background = '#e6c14d'; }}
            onMouseLeave={(e) => { if (!submitting) e.currentTarget.style.background = '#d4af37'; }}>
              {submitting ?
              <>
                  <span style={{
                  width: '14px', height: '14px',
                  border: '2px solid rgba(27,26,26,0.25)',
                  borderTopColor: 'rgba(27,26,26,0.85)',
                  borderRadius: '50%',
                  display: 'inline-block',
                  animation: 'weining-spin 0.8s linear infinite'
                }} />
                  傳送中...
                </> :
              <>送出諮詢表單</>
              }
            </button>
          </form>
        }
      </section>
    </div>);

}

        <p style={{ fontFamily: t.bodyFont, fontSize: '0.78rem', color: t.textDim, fontWeight: 300, letterSpacing: '1.2px', textAlign: 'center', lineHeight: 1.8 }}>© 2026 Weining Management Consulting. All Rights Reserved.</p>
        <div style={{ display: 'flex', gap: '1.2rem', alignItems: 'center', height: "2px" }}>

          onMouseEnter={(e) => e.target.style.color = t.text} onMouseLeave={(e) => e.target.style.color = t.textDim}>隱私政策</span>
          <span style={{ color: t.textDim, opacity: 0.45 }}>｜</span>
          <span onClick={() => setPage('terms')} style={{ fontFamily: t.bodyFont, color: t.textDim, cursor: 'pointer', transition: 'color 0.2s', letterSpacing: '1px', fontSize: "13.5px" }}
          onMouseEnter={(e) => e.target.style.color = t.text} onMouseLeave={(e) => e.target.style.color = t.textDim}>使用條款</span>

}

// ---- APP ----
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('home');

  const themeBase = THEMES[tweaks.theme] || THEMES.elegant;
  const t = { ...themeBase, theme: tweaks.theme };
  const accent = tweaks.accentColor;

  const navigate = (id) => {
    setPage(id);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const renderPage = () => {
    const props = { t, accent, setPage: navigate };
    switch (page) {
      case 'home':return <HomePage {...props} />;
      case 'about':return <AboutPage {...props} />;
      case 'operations':return <OperationsPage {...props} />;
      case 'nexus':return <NexusPage {...props} />;
      case 'contact':return <ContactPage {...props} />;
      case 'privacy':return <PrivacyPage {...props} />;
      case 'terms':return <TermsPage {...props} />;
      default:return <HomePage {...props} />;
    }
  };

  return (
    <div style={{ background: t.bg, minHeight: '100vh' }}>
      <Nav t={t} page={page} setPage={navigate} />
      {renderPage()}
      <Footer t={t} accent={accent} setPage={navigate} />
      <TweaksPanel>
        <TweakSection label="設計風格">
          <TweakRadio id="theme" label="主題" options={[{ value: 'elegant', label: '典雅版' }, { value: 'modern', label: '現代版' }]} />
        </TweakSection>
        <TweakSection label="色彩">
          <TweakColor id="accentColor" label="點綴色" />
        </TweakSection>
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
